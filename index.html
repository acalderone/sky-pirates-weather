<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sky Pirates Field – Weather Dashboard</title>
  <meta name="description" content="Live wind speed and direction for Sky Pirates RC Flying Field, Pipersville PA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07090f;
      --surface:  #0f1219;
      --border:   #1e2535;
      --text:     #e8eaf2;
      --muted:    #5a6075;
      --accent:   #4f8aff;

      --green:  #22c55e;
      --yellow: #f59e0b;
      --orange: #f97316;
      --red:    #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 0 0 env(safe-area-inset-bottom, 12px);
    }

    /* ─── Header ───────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
      filter: drop-shadow(0 0 8px rgba(79,138,255,0.6));
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
    }

    /* ─── Main card ────────────────────────────────────────────────── */
    main {
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── Status badge ─────────────────────────────────────────────── */
    #status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid currentColor;
      transition: all 0.4s ease;
    }

    #status-badge.green  { color: var(--green);  background: rgba(34,197,94,0.08);  }
    #status-badge.yellow { color: var(--yellow); background: rgba(245,158,11,0.08); }
    #status-badge.orange { color: var(--orange); background: rgba(249,115,22,0.08); }
    #status-badge.red    { color: var(--red);    background: rgba(239,68,68,0.08);  }
    #status-badge.grey   { color: var(--muted);  background: rgba(90,96,117,0.08);  }

    .pulse {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ─── Wind speed card ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Speed display */
    #wind-speed-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    #wind-speed {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      transition: color 0.4s ease;
      letter-spacing: -2px;
    }

    .speed-unit {
      font-size: 22px;
      font-weight: 400;
      color: var(--muted);
      padding-bottom: 12px;
    }

    /* ─── Compass ──────────────────────────────────────────────────── */
    .compass-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .compass-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .compass-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: radial-gradient(circle at 50% 50%, #0d1120 60%, #0a0c16);
      position: relative;
      box-shadow: 0 0 40px rgba(79,138,255,0.06), inset 0 0 30px rgba(0,0,0,0.4);
    }

    .compass-labels {
      position: absolute;
      inset: 0;
    }

    .compass-labels span {
      position: absolute;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .compass-labels .N { top: 8px;   left: 50%; transform: translateX(-50%); color: var(--accent); }
    .compass-labels .S { bottom: 8px; left: 50%; transform: translateX(-50%); }
    .compass-labels .E { right: 10px; top: 50%;  transform: translateY(-50%); }
    .compass-labels .W { left: 10px;  top: 50%;  transform: translateY(-50%); }

    #compass-needle {
      position: absolute;
      top: 50%; left: 50%;
      width: 4px;
      height: 80px;
      margin-left: -2px;
      margin-top: -68px;
      transform-origin: bottom center;
      transform: rotate(0deg);
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    #compass-needle .arrow-shaft {
      width: 3px;
      height: 60px;
      background: linear-gradient(to top, var(--accent), #a8c8ff);
      border-radius: 3px 3px 0 0;
      margin: 0 auto;
      box-shadow: 0 0 12px rgba(79,138,255,0.6);
    }

    #compass-needle .arrow-tip {
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 16px solid var(--accent);
      margin: 0 auto;
      filter: drop-shadow(0 0 6px rgba(79,138,255,0.8));
    }

    #compass-needle .arrow-tail {
      width: 3px;
      height: 20px;
      background: rgba(90,96,117,0.5);
      border-radius: 0 0 3px 3px;
      margin: 0 auto;
    }

    .compass-center {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(79,138,255,0.8);
      z-index: 2;
    }

    #dir-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    #dir-cardinal {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    #dir-degrees {
      font-size: 13px;
      color: var(--muted);
    }

    /* ─── Stats row ────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    /* ─── Footer ───────────────────────────────────────────────────── */
    footer {
      width: 100%;
      max-width: 480px;
      padding: 6px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #last-updated {
      font-size: 11px;
      color: var(--muted);
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #refresh-btn:active { transform: scale(0.95); }

    /* ─── Loading / Error overlay ──────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 99;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay p {
      font-size: 14px;
      color: var(--muted);
    }

    .speed-green  { color: var(--green) !important; }
    .speed-yellow { color: var(--yellow) !important; }
    .speed-orange { color: var(--orange) !important; }
    .speed-red    { color: var(--red) !important; }
    .speed-grey   { color: var(--muted) !important; }

    .scale-bar {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      height: 6px;
      margin-top: 12px;
    }

    .scale-seg {
      flex: 1;
      position: relative;
    }

    .scale-seg:nth-child(1) { background: var(--green); }
    .scale-seg:nth-child(2) { background: var(--yellow); }
    .scale-seg:nth-child(3) { background: var(--orange); }
    .scale-seg:nth-child(4) { background: var(--red); }

    #scale-marker {
      position: absolute;
      width: 3px; height: 10px;
      background: white;
      border-radius: 2px;
      top: -2px;
      transform: translateX(-50%);
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
      transition: left 0.6s ease;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <p id="overlay-msg">Fetching live weather…</p>
  </div>

  <header>
    <div class="logo" aria-hidden="true">✈️</div>
    <div class="header-text">
      <h1>Sky Pirates Field</h1>
      <p>Pipersville, PA · Live Conditions</p>
    </div>
  </header>

  <main>
    <!-- Fly status badge -->
    <div id="status-badge" class="grey">
      <div class="pulse"></div>
      <span id="status-text">Loading…</span>
    </div>

    <!-- Wind speed card -->
    <div class="card">
      <div class="card-label">Wind Speed</div>
      <div id="wind-speed-wrap">
        <div id="wind-speed" class="speed-grey">—</div>
        <div class="speed-unit">mph</div>
      </div>

      <div class="scale-bar">
        <div class="scale-seg">
          <div id="scale-marker" style="left:0%"></div>
        </div>
        <div class="scale-seg"></div>
        <div class="scale-seg"></div>
        <div class="scale-seg"></div>
      </div>
      <div class="scale-labels">
        <span>0</span><span>10</span><span>20</span><span>30</span><span>40+ mph</span>
      </div>
    </div>

    <!-- Compass card -->
    <div class="card compass-card">
      <div class="card-label" style="align-self:flex-start">Wind Direction</div>
      <div class="compass-wrap">
        <div class="compass-ring">
          <div class="compass-labels">
            <span class="N">N</span>
            <span class="S">S</span>
            <span class="E">E</span>
            <span class="W">W</span>
          </div>
        </div>
        <div id="compass-needle">
          <div class="arrow-tip"></div>
          <div class="arrow-shaft"></div>
          <div class="arrow-tail"></div>
        </div>
        <div class="compass-center"></div>
      </div>
      <div id="dir-display">
        <div id="dir-cardinal">—</div>
        <div id="dir-degrees">——</div>
      </div>
    </div>

    <!-- Extra stats grid -->
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="stat-temp">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humid">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Gust Speed</div>
        <div class="stat-value" id="stat-gust">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Rain Rate</div>
        <div class="stat-value" id="stat-rain">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Barometer</div>
        <div class="stat-value" id="stat-baro">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Dew Point</div>
        <div class="stat-value" id="stat-dew">—</div>
      </div>
    </div>
  </main>

  <footer>
    <div id="last-updated">Last updated: —</div>
    <button id="refresh-btn" onclick="fetchWeather()">↻ Refresh</button>
  </footer>

  <script>
    // ── Rendering helpers ───────────────────────────────────────────────
    function degreesToCardinal(deg) {
      if (deg == null) return '—';
      const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                    'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function speedColor(mph) {
      if (mph == null) return 'grey';
      if (mph < 10) return 'green';
      if (mph < 20) return 'yellow';
      if (mph < 30) return 'orange';
      return 'red';
    }

    function statusForSpeed(mph) {
      if (mph == null) return { cls: 'grey', text: 'No Data' };
      if (mph < 10) return { cls: 'green', text: 'Great to Fly 🟢' };
      if (mph < 20) return { cls: 'yellow', text: 'Flyable – Stay Alert 🟡' };
      if (mph < 30) return { cls: 'orange', text: 'Caution – Skill Required 🟠' };
      return { cls: 'red', text: 'Too Windy – Stay Grounded 🔴' };
    }

    // ── DOM references ──────────────────────────────────────────────────
    const elSpeed    = document.getElementById('wind-speed');
    const elNeedle   = document.getElementById('compass-needle');
    const elCardinal = document.getElementById('dir-cardinal');
    const elDegrees  = document.getElementById('dir-degrees');
    const elStatus   = document.getElementById('status-badge');
    const elStatusTx = document.getElementById('status-text');
    const elUpdated  = document.getElementById('last-updated');
    const elMarker   = document.getElementById('scale-marker');
    const overlay    = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');

    function render(data) {
      const mph = data.windSpeed;
      const dir = data.windDir;
      const clr = speedColor(mph);
      const sts = statusForSpeed(mph);

      elSpeed.textContent = (mph != null) ? Math.round(mph) : '—';
      elSpeed.className = `speed-${clr}`;

      const pct = Math.min((mph ?? 0) / 40 * 100, 100);
      elMarker.style.left = `${pct}%`;

      if (dir != null) {
        elNeedle.style.transform = `rotate(${dir}deg)`;
        elCardinal.textContent = data.windCardinal || degreesToCardinal(dir);
        elDegrees.textContent = `${Math.round(dir)}° (from)`;
      } else {
        elNeedle.style.transform = 'rotate(0deg)';
        elCardinal.textContent = 'Calm';
        elDegrees.textContent = '—';
      }

      elStatus.className = `${sts.cls}`;
      elStatusTx.textContent = sts.text;

      document.getElementById('stat-temp').textContent  = data.temperature ?? '—';
      document.getElementById('stat-humid').textContent = data.humidity ?? '—';
      document.getElementById('stat-gust').textContent  = data.gustRaw ?? '—';
      document.getElementById('stat-rain').textContent  = data.rainRate ?? '—';
      document.getElementById('stat-baro').textContent  = data.barometer ?? '—';
      document.getElementById('stat-dew').textContent   = data.dewPoint ?? '—';

      elUpdated.textContent = data.timestamp
        ? `Station: ${data.timestamp}`
        : `Fetched: ${new Date().toLocaleString()}`;
    }

    // ── Fetch from our own API (no CORS issues!) ────────────────────────
    let retryTimer = null;

    async function fetchWeather() {
      try {
        const res = await fetch('/api/weather');
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        render(data);
        overlay.classList.add('hidden');

        // Refresh every 5 minutes
        clearTimeout(retryTimer);
        retryTimer = setTimeout(fetchWeather, 5 * 60 * 1000);
      } catch (err) {
        console.error(err);
        overlayMsg.textContent = '⚠️ Could not load data. Retrying in 30 s…';

        clearTimeout(retryTimer);
        retryTimer = setTimeout(fetchWeather, 30 * 1000);
      }
    }

    fetchWeather();
  </script>
</body>
</html>
